<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Maze — Land, Community, Reciprocity</title>
  <meta name="description" content="An interactive essay on land, capitalism, gentrification, and BIPOC community." />

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── PERSISTENT RESTART BUTTON ───────────────────────────────────────── -->
  <!-- Hidden on intro screen via JS; visible during game -->
  <button
    class="btn-restart"
    id="global-restart"
    aria-label="Return to beginning"
    style="display:none;"
  >
    ← Return
  </button>

  <!-- ════════════════════════════════════════════════════════════════════════
       SCREEN 1: INTRO
  ═════════════════════════════════════════════════════════════════════════ -->
  <section
    id="screen-intro"
    class="screen"
    role="main"
    aria-label="Introduction"
  >
    <div class="intro-inner">
      <p class="intro-eyebrow">An Interactive Essay</p>
      <div class="divider"></div>
      <h1 class="intro-title" id="intro-title">Enter the Maze</h1>
      <div class="divider"></div>
      <p class="intro-body" id="intro-body"></p>
      <button class="btn-enter" id="btn-enter" aria-label="Enter the maze">
        Enter
      </button>
    </div>
  </section>

  <!-- ════════════════════════════════════════════════════════════════════════
       SCREEN 2: CHOICE (repeating game screen)
  ═════════════════════════════════════════════════════════════════════════ -->
  <section
    id="screen-choice"
    class="screen"
    role="main"
    aria-label="Choose a path"
    aria-hidden="true"
  >
    <div class="choice-layout">

      <!-- Left Option -->
      <div class="choice-option">
        <button
          class="choice-btn"
          id="choice-left-btn"
          aria-label="Choose left path"
        >
          <img
            id="choice-left-img"
            class="choice-img"
            src=""
            alt=""
            loading="lazy"
          />
        </button>
      </div>

      <!-- Center Separator -->
      <div class="choice-separator" aria-hidden="true">
        <div class="choice-separator-line"></div>
        <span class="choice-separator-label">or</span>
        <div class="choice-separator-line"></div>
      </div>

      <!-- Right Option -->
      <div class="choice-option">
        <button
          class="choice-btn"
          id="choice-right-btn"
          aria-label="Choose right path"
        >
          <img
            id="choice-right-img"
            class="choice-img"
            src=""
            alt=""
            loading="lazy"
          />
        </button>
      </div>

    </div>

    <!-- Invisible restart (handled by global btn) — backup for accessibility -->
    <button
      id="choice-restart"
      style="display:none;"
      aria-label="Restart maze"
    >Restart</button>
  </section>

  <!-- ════════════════════════════════════════════════════════════════════════
       SCREEN 3: DEAD END
  ═════════════════════════════════════════════════════════════════════════ -->
  <section
    id="screen-deadend"
    class="screen"
    role="main"
    aria-label="Dead end"
    aria-hidden="true"
  >
    <div class="deadend-inner">
      <p class="deadend-marker">— Dead End —</p>
      <div class="deadend-rule"></div>
      <div class="deadend-text" id="deadend-text"></div>
      <button class="btn-home" id="deadend-restart" aria-label="Return to home">
        ← Back to beginning
      </button>
    </div>

    <button
      id="deadend-restart-hidden"
      style="display:none;"
    >Restart</button>
  </section>

  <!-- ── SCRIPTS ──────────────────────────────────────────────────────────── -->
  <script src="js/maze-data.js"></script>
  <script src="js/maze.js"></script>

  <!-- Show/hide global restart btn based on screen -->
  <script>
    (function() {
      const globalRestart = document.getElementById('global-restart');
      const intro = document.getElementById('screen-intro');
      const choiceRestart = document.getElementById('choice-restart');
      const deadendRestart = document.getElementById('deadend-restart');

      // Watch for intro visibility to toggle the global restart button
      const observer = new MutationObserver(() => {
        const onIntro = intro.classList.contains('active');
        globalRestart.style.display = onIntro ? 'none' : '';
      });
      observer.observe(intro, { attributes: true, attributeFilter: ['class'] });

      // Global restart wires to the same logic
      globalRestart.addEventListener('click', () => {
        choiceRestart.click() || deadendRestart.click();
        // Fallback: trigger restart from whichever screen is active
        if (document.getElementById('screen-deadend').classList.contains('active')) {
          deadendRestart.click();
        } else {
          choiceRestart.click();
        }
      });
    })();
  </script>
</body>
</html>
